services:
  postgres:
    image: postgres:15-alpine
    container_name: gait-postgres
    environment:
      POSTGRES_USER: gait_user
      POSTGRES_PASSWORD: gait_password
      POSTGRES_DB: gait_analysis
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gait_user -d gait_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gait-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gait-redis
    command: redis-server --appendonly yes --requirepass redis_password
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gait-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: gait-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - gait-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gait-api
    environment:
      APP_ENV: development
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql://gait_user:gait_password@postgres:5432/gait_analysis
      REDIS_URL: redis://:redis_password@redis:6379/0
      CELERY_BROKER_URL: redis://:redis_password@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_password@redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: gait-analysis
      GAIT_API_KEYS: "dev-key-change-in-production"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./src/gait:/usr/local/lib/python3.11/dist-packages/gait
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn src.gait.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - gait-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gait-worker
    environment:
      APP_ENV: development
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql://gait_user:gait_password@postgres:5432/gait_analysis
      REDIS_URL: redis://:redis_password@redis:6379/0
      CELERY_BROKER_URL: redis://:redis_password@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_password@redis:6379/1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: gait-analysis
    volumes:
      - ./src:/app/src
      - ./src/gait:/usr/local/lib/python3.11/dist-packages/gait
      - ./configs:/app/configs
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - minio
    command: celery -A src.gait.api.tasks worker --loglevel=info --concurrency=4
    networks:
      - gait-network
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    container_name: gait-flower
    environment:
      CELERY_BROKER_URL: redis://:redis_password@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redis_password@redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - gait-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  gait-network:
    driver: bridge
