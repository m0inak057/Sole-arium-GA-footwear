# Gait Analysis — Pipeline Configuration
# Version: 1.0
# Last updated: 2026-06-10
#
# Controls processing parameters for each stage of the pipeline.

# Ingestion (video preprocessing)
ingestion:
  fps: 120                      # Target frames per second
  resolution: [1920, 1080]      # Target resolution [width, height]
  sync_tolerance_ms: 50         # Camera sync tolerance in milliseconds (50 for dev/30fps; 10 for production/120fps)
  # sync_mode controls how multi-camera frames are aligned:
  #   frame_index — pair by frame number (recommended for file uploads / consumer cameras)
  #   timestamp   — pair by wall-clock timestamp (requires hardware-synced cameras / PTP)
  #   auto        — probe first 100 frames and select automatically
  sync_mode: frame_index
  background_subtraction_model: mog2  # 'mog2' (MVP); extend factory for others
  person_tracking_model: simple_iou   # 'simple_iou' (MVP) | 'bytetrack' (falls back with WARNING)
  roi_margin_px: 120            # Margin around detected person in pixels (walking subject: arm swing + foot extension need generous padding)

  # Decode error tolerance
  max_consecutive_decode_failure_pct: 50  # Raise VideoDecodeError when this % of frames fail (relaxed to tolerate heavily compressed uploads)

  # Multi-camera sync
  max_unsync_frames_before_error: 100000  # Effectively disabled — frame_index sync_mode never hits this anyway, but any accidental timestamp/auto fallback must not abort on short/mismatched clips

  # MOG2 background subtraction
  mog2_history: 3               # Minimal warmup so short clips (a few seconds) aren't entirely consumed before any frame is processed. IngestionPreprocessor also adapts this further per-video (see preprocessor.py).
  mog2_var_threshold: 16.0      # Mahalanobis distance threshold for foreground
  mog2_detect_shadows: false    # Disabled: shadow pixels (127) pollute the mask
  mog2_morph_kernel_size_px: 5  # Ellipse kernel for morphological open/close cleanup

  # Person tracking (IoU)
  iou_threshold: 0.3            # Min IoU to accept blob as continuation of track
  max_lost_frames: 100000       # Effectively disabled — track.py now falls back to a full-frame low-confidence track instead of raising TrackingLostError, so this ceiling should never be hit
  min_blob_area_px2: 10         # Ignore foreground blobs smaller than this (px²) — lowered so small/low-res subjects still register

# Pose estimation
pose:
  model: mediapipe              # 'mediapipe' (Phase 1) or custom (Phase 2+)
  model_path: data/models/pose_landmarker_lite.task  # Path to MediaPipe Pose Landmarker task model (auto-downloaded if missing)
  confidence_threshold: 0.5     # Drop keypoints with confidence < 0.5
  smoothing_window: 5           # 1-Euro filter window size
  use_3d_lifting: true          # Use 2D→3D monocular lift (Phase 1)
  use_multiview_triangulation: false  # Multi-view 3D (Phase 3+)
  batch_size: 32                # Frames per inference batch

# Event detection
events:
  heel_strike_model: velocity_based  # 'velocity_based' (MVP)
  heel_strike_threshold: 0.05        # HS peak prominence (fraction of y range) - low: posterior/anterior views have subtle vertical bounce
  toe_off_threshold: 0.05            # TO peak prominence (fraction of y range) - same reason
  event_confidence_min: 0.1          # Drop events with keypoint confidence < this (lowered: MediaPipe presence for lower-leg landmarks in side-view/cropped footage is typically 0.3-0.6)
  min_frames_between_events: 3       # Minimum frames between two HS (or two TO) — lowered so short clips can still yield 1-2 cycles
  smoothing_window_frames: 3         # Moving-average window before peak detection - reduced from 5 to avoid flattening subtle peaks

# Analysis
analysis:
  compute_kinematics_peaks: true
  compute_symmetry_indices: true
  symmetry_flag_threshold_pct: 10.0
  # Foot-strike classification thresholds (degrees)
  rearfoot_min_deg: 5.0       # FSA > +5° → rearfoot
  forefoot_max_deg: -5.0      # FSA < -5° → forefoot
  # Pronation classification (positive = eversion/pronation)
  overpronation_min_deg: 8.0
  mild_pronation_min_deg: 4.0
  neutral_min_deg: 0.0
  mild_supination_min_deg: -4.0
  # Arch height index
  high_ahi_min: 0.30
  normal_ahi_min: 0.20
  # Quality gating — 0 complete cycles no longer forces RERECORD/placeholder
  # mode; a foot can still have a real PARTIAL_CYCLE or raw event data (see
  # segment_gait_cycles/profile/builder.py).
  min_clean_cycles_per_foot: 0
  target_clean_cycles_per_foot: 1

# Profile generation
profile:
  schema_version: profile/v1
  include_quality_metrics: true
  include_processing_metadata: true
  include_cycle_timeseries: false  # Separate endpoint for timeseries
  apply_recommendation_rules: true
  version_schema_in_output: true

# Features (enable/disable by phase)
features:
  multi_view_3d: false         # Phase 3
  pressure_mat_validation: false  # Phase 3
  custom_foot_model: false     # Phase 2
  face_blur_pipeline: true     # Privacy
  audit_logging: true          # Privacy/compliance

# Performance tuning
performance:
  ingestion_timeout_sec: 60
  pose_estimation_timeout_sec: 120
  event_detection_timeout_sec: 30
  analysis_timeout_sec: 60
  profile_generation_timeout_sec: 30
  batch_processing: true       # Batch pose detection for efficiency
  batch_size: 32               # Frames per batch

# Logging
logging:
  level: INFO                  # DEBUG, INFO, WARNING, ERROR
  format: json                 # json or text
  include_timestamps: true
  include_module_names: true

# Development/testing
development:
  mock_video_enabled: false              # NOT IMPLEMENTED — use synthetic video for testing
  synthetic_data_mode: false             # NOT IMPLEMENTED — generate synthetic profiles
  skip_calibration_check: false          # NOT IMPLEMENTED — allow uncalibrated cameras
  skip_gating_check: false               # Bypass the minimum-clean-cycle-count gate (forces PROCEED_OK)
  verbose_logging: false                 # Set all gait.* loggers to DEBUG
